name: Mobile E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e-mobile:
    runs-on: macos-13
    timeout-minutes: 45

    env:
      DATABASE_PATH: ${{ github.workspace }}/data/e2e-mobile.db
      EXPO_PUBLIC_API_URL: http://10.0.2.2:3000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.4.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            packages/mobile/android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('packages/mobile/android/gradle/wrapper/gradle-wrapper.properties', 'packages/mobile/android/build.gradle', 'packages/mobile/android/app/build.gradle') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache Expo prebuild
        uses: actions/cache@v4
        with:
          path: packages/mobile/android
          key: expo-prebuild-${{ runner.os }}-${{ hashFiles('packages/mobile/app.json', 'packages/mobile/package.json') }}
          restore-keys: |
            expo-prebuild-${{ runner.os }}-

      - name: Seed test database
        run: DATABASE_PATH=${{ env.DATABASE_PATH }} pnpm tsx packages/database/src/seed.ts

      - name: Start API server
        run: |
          DATABASE_PATH=${{ env.DATABASE_PATH }} pnpm --filter @acme/api start &
          # Wait for API to be ready
          for i in $(seq 1 30); do
            if curl -s http://localhost:3000/health > /dev/null 2>&1; then
              echo "API server is ready"
              break
            fi
            echo "Waiting for API server... ($i/30)"
            sleep 2
          done

      - name: Expo prebuild
        working-directory: packages/mobile
        run: npx expo prebuild --platform android --no-install

      - name: Build debug APK
        working-directory: packages/mobile/android
        run: ./gradlew assembleDebug

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Run Maestro E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb install packages/mobile/android/app/build/outputs/apk/debug/app-debug.apk
            $HOME/.maestro/bin/maestro test packages/mobile/maestro/flows/

      - name: Upload Maestro artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: maestro-artifacts
          path: |
            ~/.maestro/tests/
            /tmp/maestro-screenshots/
          retention-days: 7
