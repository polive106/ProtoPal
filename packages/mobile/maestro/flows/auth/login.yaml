appId: com.acme.protopal
---
- launchApp:
    clearState: true
- assertVisible:
    id: "login-card"
- tapOn:
    id: "login-input-email"
- inputText: "admin@protopal.com"
- tapOn:
    id: "login-input-password"
- inputText: "Password1!"
- tapOn:
    id: "login-btn-submit"
- assertVisible:
    id: "dashboard-screen"
- assertVisible:
    id: "dashboard-text-welcome"
