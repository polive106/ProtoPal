appId: com.acme.protopal
---
- launchApp:
    clearState: true
- assertVisible:
    id: "login-card"
- tapOn:
    id: "login-input-email"
- inputText: "admin@protopal.com"
- tapOn:
    id: "login-input-password"
- inputText: "Password1!"
- tapOn:
    id: "login-btn-submit"
- assertVisible:
    id: "dashboard-screen"
- tapOn:
    id: "dashboard-btn-notes"
- assertVisible:
    id: "notes-list"
- tapOn:
    id: "notes-card-.*"
- assertVisible:
    id: "notes-detail-screen"
- tapOn:
    id: "notes-btn-delete"
- assertVisible:
    id: "notes-confirm-delete"
- tapOn:
    id: "notes-confirm-delete-confirm"
- assertVisible:
    id: "notes-list"
