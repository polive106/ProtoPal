appId: com.acme.protopal
---
- launchApp:
    clearState: true
- assertVisible:
    id: "login-card"
- tapOn:
    id: "login-input-email"
- inputText: "admin@example.com"
- tapOn:
    id: "login-input-password"
- inputText: "Admin123!"
- tapOn:
    id: "login-btn-submit"
- assertVisible:
    id: "dashboard-screen"
- tapOn:
    id: "dashboard-btn-notes"
- assertVisible:
    id: "notes-list"
- tapOn:
    id: "notes-card-.*"
- assertVisible:
    id: "notes-detail-screen"
- tapOn:
    id: "notes-btn-edit"
- assertVisible:
    id: "notes-form"
- tapOn:
    id: "notes-input-title"
- clearText
- inputText: "Updated E2E Note"
- tapOn:
    id: "notes-btn-save"
- assertVisible:
    id: "notes-detail-screen"
